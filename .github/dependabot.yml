# FMC Dependabot defaults — minimal PR count.
# Policy: one open PR per ecosystem; bundle all minor/patch updates into a single group.
# See FixMyBerlin/fixmyskills → tech-stack/references/dependabot.md
version: 2
updates:
  - package-ecosystem: bun
    directories:
      - /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/Berlin
    cooldown:
      default-days: 5
    open-pull-requests-limit: 1
    exclude-paths:
      - .cursor/**
    commit-message:
      prefix: chore
      include: scope
    groups:
      bun-security:
        applies-to: security-updates
        patterns:
          - '*'

      bun-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/Berlin
    cooldown:
      default-days: 5
    open-pull-requests-limit: 1
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
